}
document.getElementById('bcReturn').addEventListener('click',returnBook);
document.getElementById('bcTake').addEventListener('click',takeBook);

const _fw=new THREE.Vector3(), _up=new THREE.Vector3(), _tq=new THREE.Quaternion(), _tp2=new THREE.Vector3();
const Q_ALIGN=new THREE.Quaternion().setFromEuler(new THREE.Euler(0,-Math.PI/2,0));
function tickBook(dt,t){
  if(bookAnim){
    const a=bookAnim, mesh=a.mesh, ud=mesh.userData;
    if(a.phase==='out'){
      a.t+=dt/0.55;
      const k=smooth(clamp(a.t,0,1));
      mesh.position.copy(ud.startPos).addScaledVector(a.outDir,k*0.26);
      if(a.t>=1){ a.phase='fly'; a.t=0; a.flyFrom=mesh.position.clone(); a.flyFromQ=mesh.quaternion.clone(); }
    } else if(a.phase==='fly'){
      a.t+=dt/0.9;
      const k=smooth(clamp(a.t,0,1));
      camera.getWorldDirection(_fw);
      _tp2.copy(camera.position).addScaledVector(_fw,0.58);
      _tp2.y-=0.03;
      _tq.copy(camera.quaternion).multiply(Q_ALIGN);
      mesh.position.lerpVectors(a.flyFrom,_tp2,k);
      mesh.quaternion.slerpQuaternions(a.flyFromQ,_tq,k);
      if(a.t>=1){ a.phase='hold'; ud.state='inspecting'; }
    } else if(a.phase==='hold'){
      camera.getWorldDirection(_fw);
      _tp2.copy(camera.position).addScaledVector(_fw,0.58); _tp2.y-=0.03;
      mesh.position.lerp(_tp2,1-Math.pow(0.001,dt));
      _tq.copy(camera.quaternion).multiply(Q_ALIGN);
      _tq.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler(
        Math.sin(t*0.7)*0.06, Math.sin(t*0.5)*0.22+0.15, 0)));
      mesh.quaternion.slerp(_tq,1-Math.pow(0.001,dt));
      if(!S.inspecting || S.inspecting!==mesh) bookAnim=null;
    } else if(a.phase==='return'||a.phase==='toTable'){
      a.t+=dt/1.1;
      const k=smooth(clamp(a.t,0,1));
      mesh.position.lerpVectors(a.fromPos,a.toPos,k);
      mesh.quaternion.slerpQuaternions(a.fromQuat,a.toQuat,k);
      if(a.t>=1){
        if(a.phase==='return'){
          mesh.material=mesh.userData.shelfMat; mesh.children[0].visible=true;
          mesh.castShadow=true; mesh.userData.state='shelved';
        } else { mesh.userData.state='taken'; mesh.castShadow=true; }
        bookAnim=null;
      }
    }
  }
  // book light + dim follow inspection
  const want=S.inspecting?0.85:0;
  bookLight.intensity+= (want-bookLight.intensity)*Math.min(1,dt*5);
  if(bookLight.intensity>0.01){
    camera.getWorldDirection(_fw);
    _up.set(0,1,0).applyQuaternion(camera.quaternion);
    bookLight.position.copy(camera.position).addScaledVector(_fw,0.28).addScaledVector(_up,0.22);
  }
  // curated gilt glow when you draw near
  for(let i=0;i<curatedMeshes.length;i++){
    const m=curatedMeshes[i];
    if(m.userData.state!=='shelved') continue;
    const d=m.position.distanceTo(camera.position);
    const mat=m.material;
    if(d<3.2) mat.emissiveIntensity=lerp(mat.emissiveIntensity,(1-d/3.2)*(0.22+0.1*Math.sin(t*2.2+i*1.7)),0.1);
    else if(mat.emissiveIntensity>0.003) mat.emissiveIntensity*=0.9;
  }
}

/* ============================================================
   13. UI wiring, PWA, resize, loop, boot
   ============================================================ */
const SEASON_LIST=['spring','summer','autumn','winter'];
const TIME_LIST=[['dawn','Dawn'],['day','Day'],['golden','Golden Hour'],['rain','Rain'],['storm','Storm'],['night','Night']];

  const rs=document.getElementById('rowSeason'), rt=document.getElementById('rowTime');

    const b=document.createElement('button'); b.className='epBtn'; b.dataset.v=k;
    b.textContent=label;
    b.addEventListener('click',()=>setEnv(S.season,k));
    rt.appendChild(b);
  }
  document.getElementById('btnEnv').addEventListener('click',()=>{
    document.getElementById('envPanel').classList.toggle('open');
  });
  document.getElementById('btnAudio').addEventListener('click',e=>{

    ictx.font='300px Georgia, serif'; ictx.textAlign='center'; ictx.textBaseline='middle';
    ictx.fillStyle='#dfbd72'; ictx.fillText('❦',256,276);

function syncEnvUI(){
  document.querySelectorAll('#rowSeason .epBtn').forEach(b=>b.classList.toggle('sel',b.dataset.v===S.season));
  document.querySelectorAll('#rowTime .epBtn').forEach(b=>b.classList.toggle('sel',b.dataset.v===S.time));
}

function onResize(){
  const w=innerWidth,h=innerHeight;
  camera.aspect=w/h; camera.fov=w<h?74:62; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h);
}
addEventListener('resize',onResize);
addEventListener('orientationchange',()=>setTimeout(onResize,300));

/* adaptive quality */
let prMax=Math.min(devicePixelRatio,2), pr=prMax, frameAcc=0, frameN=0, qTimer=0;
function tickQuality(dt){
  frameAcc+=dt; frameN++; qTimer+=dt;
  if(qTimer<2.2) return;
  const avg=frameAcc/Math.max(1,frameN);
  frameAcc=0; frameN=0; qTimer=0;
  if(avg>0.031 && pr>1){ pr=Math.max(1,pr-0.25); renderer.setPixelRatio(pr); onResize(); }
  else if(avg<0.017 && pr<prMax){ pr=Math.min(prMax,pr+0.25); renderer.setPixelRatio(pr); onResize(); }
}

/* lightning */
let ltTimer=rand(3,7), flashV=0;
const flashEl=document.getElementById('flash');
function tickLightning(dt){
  if(LIVE.thunder>0.5){
    ltTimer-=dt;
    if(ltTimer<=0){
      ltTimer=rand(4,13);
      flashV=1.1;
      if(AudioSys.on) setTimeout(()=>AudioSys.thunder(),rand(500,2600));
    }
  }
  if(flashV>0.002){
    flashV*=Math.exp(-dt*5.5);
    if(rng()<0.06) flashV*=1.5; // stutter
    skyMat.uniforms.flash.value=flashV*0.7;
    flashEl.style.opacity=Math.min(0.65,flashV*0.5);
  } else if(skyMat.uniforms.flash.value>0){ skyMat.uniforms.flash.value=0; flashEl.style.opacity=0; }
}

/* main loop */
const clock=new THREE.Clock();
let birdCooldown=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  tickEnv(dt); tickCamera(dt); tickBook(dt,t); tickLightning(dt); tickQuality(dt);
  camera.rotation.set(pitch,yaw,0,'YXZ');
  // fire flicker
  if(FIRE){ const f=LIVE.fire;
    FIRE.light.intensity=FIRE.base*f*(0.72+0.28*(Math.sin(t*11)*0.35+Math.sin(t*23+1)*0.3+Math.sin(t*5.3)*0.35+1)*0.5);
    fireMat.uniforms.time.value=t;
    emberPts.material.uniforms.time.value=t;
  }
  for(const m of shaftMats) m.uniforms.time.value=t;
  dustMat.uniforms.time.value=t;
  skyMat.uniforms.time.value=t;
  glassStreakMat.uniforms.time.value=t;
  rainMat.uniforms.time.value=t; snowMat.uniforms.time.value=t; leafMat.uniforms.time.value=t;
  // marker pulse
  for(const g of markers){
    const s2=1+0.1*Math.sin(t*2.4+g.position.x);
    g.userData.ring.scale.setScalar(s2);
    g.userData.ring.material.opacity=0.4+0.22*Math.sin(t*2.4+g.position.x);
  }
  // birdsong scheduling
  birdCooldown-=dt;
  if(AudioSys.on && LIVE.bird>0.05 && birdCooldown<=0 && Math.random()<LIVE.bird*0.4){
    AudioSys.chirp(); birdCooldown=rand(0.8,4);
  }
  finalPass.uniforms.time.value=t;
  composer.render();
}

/* ---- photo-texture upgrade: real scans swap in over the procedural set ----
   Served same-origin from ./textures/. If unavailable (e.g. file://), the
   procedural materials simply remain — nothing breaks. */
function upgradePhotoTextures(){
  const TL=new THREE.TextureLoader();
  const grab=(url,fn)=>TL.load(url,t=>{ try{fn(t);}catch(e){} },undefined,()=>{});
  const prep=(t,rx,ry,srgb)=>{ t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rx,ry);
    t.anisotropy=8; if(srgb) t.colorSpace=THREE.SRGBColorSpace; return t; };
  // oak floor — photo diffuse/bump/roughness
  grab('textures/hardwood2_diffuse.jpg',t=>{
    prep(t,2.4,1.8,true);
    M.floor.map=t; M.floor.normalMap=null; M.floor.color.set(0xb9a488); M.floor.needsUpdate=true;
    // the same oak, small-scale + tinted walnut, for the panelled walls
    const w=t.clone(); prep(w,0.5,0.5,true);
    M.panel.map=w; M.panel.color.set(0x77543a); M.panel.needsUpdate=true;
  });
  grab('textures/hardwood2_bump.jpg',t=>{
    prep(t,2.4,1.8,false); M.floor.bumpMap=t; M.floor.bumpScale=0.6; M.floor.needsUpdate=true; });
  grab('textures/hardwood2_roughness.jpg',t=>{
    prep(t,2.4,1.8,false); M.floor.roughnessMap=t; M.floor.needsUpdate=true; });
  // photo grass outside
  grab('textures/grass.jpg',t=>{
    prep(t,18,11,true); groundMat.map=t; groundMat.needsUpdate=true;
    PHOTO.grass=true; applyLive();
  });
  // real HDRI environment — photographic reflections & fill light
  try{
    new RGBELoader().load('textures/venice_sunset_1k.hdr',t=>{
      t.mapping=THREE.EquirectangularReflectionMapping;
      scene.environment=pmrem.fromEquirectangular(t).texture;
      t.dispose();
    },undefined,()=>{});
  }catch(e){}
}
function registerSW(){
  try{ if('serviceWorker' in navigator && location.protocol.startsWith('http'))
    navigator.serviceWorker.register('sw.js'); }catch(e){}
}

/* staged boot so the loading screen paints */
const BOOT=[
  buildFloorWood, buildShelfWood, buildPanelWood, buildBrass, buildPaper, buildStone,
  buildPlaster, buildRug, buildLeafSprite, buildPainting, buildAtlas,
  buildMaterials, buildRoom, buildLibrary, buildBalcony,
  buildFireplace, buildSeating, buildTables, buildShafts, buildFloorAO,
  buildExterior, buildWeather, buildMarkers, initUI,
  ()=>{ setEnv(S.season,S.time,true); moveTo(0,true); onResize(); },
  ()=>{ upgradePhotoTextures(); registerSW(); },
  ()=>{ animate();
    document.getElementById('loading').classList.add('done');
    const hint=document.getElementById('hint');
    setTimeout(()=>{ hint.style.opacity=0.9; },1800);
    setTimeout(()=>{ hint.style.opacity=0; },11000);
  },
];
let bootI=0;
function bootStep(){
  try{ BOOT[bootI++](); }
  catch(err){ errBox.textContent='boot: '+(err.stack||err); console.error(err); return; }
  if(bootI<BOOT.length) setTimeout(bootStep,1);
}
bootStep();
